  correction_note: "2026-04-11: retroactive audit found 5 QA-upgraded MAPs (PMIDs 29338621, 36325158, 34637343, 40135470, 38445382) had been omitted from fulltext_screening_decisions.csv. Added. Simultaneously dropped PMID 41218611 (Semaglutide) from included set — full text unobtainable (no open-access version identified via OpenAlex or Crossref metadata, not in PubMed Central / Europe PMC, publisher-paywalled). 2026-04-11 (Wave 2, criterion refinement): additionally dropped 3 records (PMID 37227402 VIVRE vortioxetine NCT04448431; PMID 39144112 NaB+NAC schizophrenia NCT03510741; PMID 28044255 Mavoglurant OCD NCT01813019) after simplified Canadian criterion was applied — all three had only PI/author Canadian affiliations with NO verified Canadian recruitment sites. Verified via PDF Methods sections and ClinicalTrials.gov API. Net included: 65 + 5 - 1 - 3 = 66."
