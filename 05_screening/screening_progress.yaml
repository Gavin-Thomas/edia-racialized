  # recruitment sites. These 3 records were reclassified from INCLUDE → EXCLUDE.
  dropped_from_included:
    - pmid: 37227402  # VIVRE vortioxetine vs desvenlafaxine MDD (NCT04448431) — 80 sites across 12 countries (RU, AR, UA, CZ, BG, SK, SE, ES, BE, LV, MX, EE); McIntyre (Toronto) is lead author only, not a site PI
