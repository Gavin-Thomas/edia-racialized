    - pmid: 28044255  # Mavoglurant OCD augmentation (NCT01813019) — 15 sites across 5 countries (BG, DE, US, CZ, CH); Gomez-Mancilla's McGill listing is secondary cross-appointment (primary: Novartis Basel)
  net_change:
    included_after_fulltext: -3  # 69 → 66
    excluded_at_fulltext: +3     # 64 → 67
