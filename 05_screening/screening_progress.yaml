# PRISMA 2020 terminology crosswalk:
#   MAP (Mapped to Objectives) = PRISMA "Include"
#   OUT_OF_SCOPE              = PRISMA "Exclude"
#   UNCERTAIN                 = PRISMA "Seek additional information"
# The MAP terminology is used in screening because it emphasises alignment
# with the scoping review objectives (JBI) rather than binary eligibility.
# For PRISMA flow diagram reporting, convert:
#   MAP → "Reports included in review"
#   UNCERTAIN → "Reports awaiting classification" or resolve to MAP/OUT_OF_SCOPE
prisma_crosswalk:
  MAP: "Included"
  OUT_OF_SCOPE: "Excluded"
  UNCERTAIN: "Awaiting classification"
